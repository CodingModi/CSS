    <H1>CSS SELECTORS</H1><br><br><br>
    <p>CSS selectors are used to "find" (or select) the HTML elements you want to style.</p>
    <p>We can divide CSS selectors into five categories:</p><br><br>
     <ol type="1">
            <li>Universal selector</li>
            <li>id selector      </li>
            <li>class selector   </li>
            <li>group selector   </li> </ol><br><br>
